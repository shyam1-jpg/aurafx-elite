<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>System Status — AuraFX Admin</title>
  <link rel="stylesheet" href="css/site.css" />
  <link rel="stylesheet" href="css/institutional.css" />
  <script src="js/font-loader.js"></script>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="logo" style="text-decoration:none">AuraFX <span>Elite</span></a>
    <div class="nav-links">
      <a href="owner-leads.html">Leads</a>
      <a href="dashboard.html">Dashboard</a>
      <button type="button" class="btn btn-outline" id="btnLogout" style="font-size:.8rem">Sign out</button>
    </div>
  </nav>

  <section class="section" style="padding-top:2rem">
    <h2>System status</h2>
    <p style="text-align:center;color:var(--muted);max-width:640px;margin:0 auto 1rem;font-size:.9rem">
      Admin-only health check for APIs and pages. Auto-refresh every 10 seconds.
    </p>
    <div id="wiringSummary" class="card" style="max-width:800px;margin:0 auto 1rem;text-align:center"><p>Running checks…</p></div>
    <div id="wiringServer" class="card" style="max-width:800px;margin:0 auto 1rem"></div>
    <div id="wiringApis" class="card" style="max-width:800px;margin:0 auto 1rem"></div>
    <div id="wiringPages" class="card" style="max-width:800px;margin:0 auto 1rem"></div>
    <div id="wiringModules" class="card" style="max-width:800px;margin:0 auto 1rem"></div>
    <p style="text-align:center;margin-top:1rem">
      <button type="button" id="btnRetest" class="btn btn-gold">Run again</button>
      <a href="dashboard.html" class="btn btn-outline" style="margin-left:.5rem">Dashboard</a>
    </p>
  </section>

  <footer class="footer"><p>Admin area · Auto-refresh 10s</p></footer>

  <script src="js/site-boot.js"></script>
  <script src="js/admin-pages.js"></script>
  <script src="js/system-status.js?v=4"></script>
  <script>document.getElementById('btnLogout').onclick = function () { AURAFX_ADMIN.adminLogout(); };</script>
</body>
</html>
